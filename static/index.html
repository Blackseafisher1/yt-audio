<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>YouTube Batch Downloader</title>
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 24px; --space-6: 32px;
      --size-fluid-1: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --size-fluid-2: clamp(0.875rem, 0.8rem + 0.375vw, 1rem);
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      --radius-sm: 3px; --radius-md: 5px; --radius-lg: 8px;

      --color-bg: light-dark(#f4f5f7, #0d1117);
      --color-bg-surface: light-dark(#ffffff, #161b22);
      --color-bg-hover: light-dark(#f0f1f3, #1c2333);
      --color-bg-active: light-dark(#e5e7eb, #21283b);
      --color-text: light-dark(#1f2328, #e6edf3);
      --color-text-muted: light-dark(#656d76, #8b949e);
      --color-border: light-dark(#d0d7de, #30363d);
      --color-accent: light-dark(#0969da, #58a6ff);
      --color-accent-hover: light-dark(#0550ae, #4a9af5);
      --color-success: light-dark(#1a7f37, #3fb950);
      --color-error: light-dark(#cf222e, #f85149);
      --color-warning: light-dark(#9a6700, #d29922);
    }

    :root[data-theme='light'] { color-scheme: light; }
    :root[data-theme='dark'] { color-scheme: dark; }

    html { font-size: 100%; -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font-sans);
      font-size: var(--size-fluid-2);
      line-height: 1.6;
      color: var(--color-text);
      background: var(--color-bg);
      min-height: 100vh;
      min-height: calc(100vh - env(safe-area-inset-bottom, 0));
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .app-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: var(--space-5) var(--space-4);
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-5);
    }

    .app-header h1 {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .theme-toggle {
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-1) var(--space-3);
      font-size: var(--size-fluid-1);
      cursor: pointer;
      color: var(--color-text);
      font-family: inherit;
    }

    .theme-toggle:hover { background: var(--color-bg-hover); border-color: var(--color-accent); }

    label { font-size: var(--size-fluid-1); font-weight: 500; color: var(--color-text); display: block; margin-bottom: var(--space-1); }

    textarea {
      width: 100%;
      padding: var(--space-3);
      font-family: var(--font-mono);
      font-size: var(--size-fluid-1);
      line-height: 1.5;
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-text);
      resize: vertical;
      transition: border-color 0.15s;
    }

    textarea:focus { outline: none; border-color: var(--color-accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--color-accent) 25%, transparent); }

    .input-bar { display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-1); }

    .input-bar label { margin-bottom: 0; }

    .hist-toggle {
      font-size: var(--size-fluid-1);
      padding: var(--space-1) var(--space-2);
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--color-text-muted);
      font-family: inherit;
    }

    .hist-toggle:hover { color: var(--color-text); border-color: var(--color-accent); }

    .hist-list {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-1);
      margin-bottom: var(--space-3);
    }

    .hist-list button {
      font-size: var(--size-fluid-1);
      padding: var(--space-1) var(--space-2);
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--color-text-muted);
      font-family: inherit;
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hist-list button:hover { color: var(--color-text); border-color: var(--color-accent); background: var(--color-bg-hover); }

    .opt-row { display: flex; flex-wrap: wrap; gap: var(--space-4); align-items: center; margin: var(--space-3) 0; }

    .radio-group { display: flex; gap: var(--space-4); }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      font-size: var(--size-fluid-1);
      font-weight: 400;
      cursor: pointer;
      margin-bottom: 0;
    }

    .radio-group input { accent-color: var(--color-accent); width: 16px; height: 16px; cursor: pointer; }

    .quality-group { display: flex; align-items: center; gap: var(--space-2); }

    .quality-group label { margin-bottom: 0; font-weight: 400; }

    select {
      padding: var(--space-1) var(--space-3);
      font-size: var(--size-fluid-1);
      font-family: inherit;
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      color: var(--color-text);
      cursor: pointer;
    }

    select:focus { outline: none; border-color: var(--color-accent); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-2) var(--space-5);
      font-size: var(--size-fluid-2);
      font-family: inherit;
      font-weight: 500;
      border: 1px solid var(--color-accent);
      border-radius: var(--radius-md);
      background: var(--color-accent);
      color: #fff;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover { background: var(--color-accent-hover); border-color: var(--color-accent-hover); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .status {
      margin-top: var(--space-4);
      padding: var(--space-3) var(--space-4);
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: var(--size-fluid-1);
      font-family: var(--font-mono);
      white-space: pre-wrap;
    }

    .status.error { border-color: var(--color-error); color: var(--color-error); }

    .files { margin-top: var(--space-4); }

    .files h3 {
      font-size: var(--size-fluid-1);
      font-weight: 600;
      margin-bottom: var(--space-2);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .files ul { list-style: none; display: flex; flex-direction: column; gap: var(--space-1); }

    .files li {
      padding: var(--space-2) var(--space-3);
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
    }

    .files li:hover { border-color: var(--color-accent); }

    .files a { color: var(--color-accent); text-decoration: none; font-size: var(--size-fluid-1); }
    .files a:hover { text-decoration: underline; }

    .files .size { color: var(--color-text-muted); font-size: var(--size-fluid-1); }

    .zip-btn {
      display: inline-flex;
      align-items: center;
      margin-top: var(--space-3);
      padding: var(--space-2) var(--space-5);
      background: var(--color-success);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      text-decoration: none;
      font-size: var(--size-fluid-1);
      font-weight: 500;
      transition: filter 0.15s;
    }

    .zip-btn:hover { filter: brightness(1.15); text-decoration: none; color: #fff; }

    .cookie-area { margin-top: var(--space-4); padding: var(--space-3); background: var(--color-bg-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); }
    .cookie-area summary { cursor: pointer; font-size: var(--size-fluid-1); color: var(--color-text-muted); font-weight: 500; }
    .cookie-area summary:hover { color: var(--color-text); }
    .cookie-status { font-size: var(--size-fluid-1); margin-top: var(--space-2); }
    .cookie-ok { color: var(--color-success); }
    .cookie-missing { color: var(--color-warning); }
    .cookie-upload { margin-top: var(--space-2); display: flex; gap: var(--space-2); align-items: center; flex-wrap: wrap; }
    .cookie-upload input[type=file] { font-size: var(--size-fluid-1); font-family: inherit; }
    .cookie-upload .btn-sm { padding: var(--space-1) var(--space-3); font-size: var(--size-fluid-1); background: var(--color-bg-hover); border: 1px solid var(--color-border); border-radius: var(--radius-sm); cursor: pointer; color: var(--color-text); }
    .cookie-upload .btn-sm:hover { border-color: var(--color-accent); }

    .p-subtle { font-size: var(--size-fluid-1); color: var(--color-text-muted); margin-bottom: var(--space-3); }

    @media (max-width: 640px) {
      .app-wrap { padding: var(--space-3) var(--space-2); }
      .app-header h1 { font-size: 1rem; }
      .opt-row { flex-direction: column; align-items: flex-start; gap: var(--space-2); }
      .btn, select, textarea, .hist-toggle, .theme-toggle, .hist-list button, .zip-btn { font-size: 16px !important; }
      .files li { padding: var(--space-3); }
      .hist-list button { max-width: 160px; }
    }
  </style>
</head>
<body>
  <div class="app-wrap">
    <div class="app-header">
      <h1>YouTube Batch Downloader</h1>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">Dark</button>
    </div>
    <p class="p-subtle">Paste YouTube URLs. Supports videos &amp; playlists.</p>

    <form id="form">
      <div class="input-bar">
        <label for="urls">URLs</label>
        <button type="button" class="hist-toggle" id="toggleHistory">History</button>
      </div>
      <div id="historyList" class="hist-list" style="display:none"></div>
      <textarea id="urls" rows="5" placeholder="https://youtube.com/watch?v=...&#10;https://youtube.com/playlist?list=..."></textarea>

      <div class="opt-row">
        <div class="radio-group">
          <label><input type="radio" name="mode" value="audio" checked> Audio</label>
          <label><input type="radio" name="mode" value="video"> Video</label>
        </div>

        <div class="quality-group">
          <label for="quality">Quality</label>
          <select id="quality">
            <option value="best">Best</option>
            <option value="2160">4K</option>
            <option value="1080">1080p</option>
            <option value="720">720p</option>
            <option value="480">480p</option>
            <option value="360">360p</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn">Start Download</button>
    </form>

    <details class="cookie-area">
      <summary>YouTube cookies (only if bot-blocked)</summary>
      <div class="cookie-status" id="cookieStatus">Checking...</div>
      <div class="cookie-upload">
        <input type="file" id="cookieFile" accept=".txt">
        <button type="button" class="btn-sm" id="uploadCookieBtn">Upload cookies.txt</button>
      </div>
      <p class="p-subtle" style="margin-top:var(--space-2)">Export cookies from browser as Netscape format. See <a href="https://github.com/yt-dlp/yt-dlp/wiki/FAQ#how-do-i-pass-cookies-to-yt-dlp" target="_blank">yt-dlp guide</a>.</p>
    </details>

    <div id="status" class="status" style="display:none"></div>
    <div class="files" id="files"></div>
  </div>

  <script>
    const HISTORY_KEY = 'ytdl_url_history';
    const MAX_HISTORY = 20;
    const STORAGE_THEME_KEY = 'ytdl_theme';

    function getHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
    }

    function addHistory(urls) {
      const h = getHistory();
      const entry = urls.trim();
      if (!entry) return;
      const idx = h.indexOf(entry);
      if (idx > -1) h.splice(idx, 1);
      h.unshift(entry);
      if (h.length > MAX_HISTORY) h.length = MAX_HISTORY;
      localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
    }

    function renderHistory() {
      const h = getHistory();
      const el = document.getElementById('historyList');
      if (!h.length) { el.style.display = 'none'; return; }
      el.style.display = 'flex';
      el.innerHTML = h.map(u => `<button type="button" class="hist-item">${u.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</button>`).join('');
      el.querySelectorAll('.hist-item').forEach((btn, i) => {
        btn.addEventListener('click', () => {
          document.getElementById('urls').value = h[i];
          el.style.display = 'none';
        });
      });
    }

    document.getElementById('toggleHistory').addEventListener('click', () => {
      const el = document.getElementById('historyList');
      el.style.display = el.style.display === 'none' ? 'flex' : 'none';
      if (el.style.display === 'flex') renderHistory();
    });

    // Theme
    const themeToggle = document.getElementById('themeToggle');
    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      themeToggle.textContent = t === 'dark' ? 'Dark' : 'Light';
      localStorage.setItem(STORAGE_THEME_KEY, t);
    }
    const saved = localStorage.getItem(STORAGE_THEME_KEY) || 'dark';
    setTheme(saved);
    themeToggle.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme');
      setTheme(cur === 'dark' ? 'light' : 'dark');
    });

    // Cookies
    async function checkCookies() {
      const el = document.getElementById('cookieStatus');
      try {
        const r = await fetch('/cookies-status/');
        const d = await r.json();
        el.innerHTML = d.status === 'present'
          ? '<span class="cookie-ok">Cookies loaded (' + d.size_bytes + ' bytes)</span>'
          : '<span class="cookie-missing">No cookies — Android client active (may still fail on some videos)</span>';
      } catch { el.textContent = 'Could not check'; }
    }
    checkCookies();

    document.getElementById('uploadCookieBtn').addEventListener('click', async () => {
      const input = document.getElementById('cookieFile');
      if (!input.files.length) { alert('Select a cookies.txt file first'); return; }
      const fd = new FormData();
      fd.append('file', input.files[0]);
      const btn = document.getElementById('uploadCookieBtn');
      btn.textContent = 'Uploading...';
      try {
        const r = await fetch('/upload-cookies/', { method: 'POST', body: fd });
        const d = await r.json();
        alert(d.message);
        checkCookies();
      } catch (e) { alert('Upload failed: ' + e.message); }
      btn.textContent = 'Upload cookies.txt';
      input.value = '';
    });

    const form = document.getElementById('form');
    const statusEl = document.getElementById('status');
    const filesEl = document.getElementById('files');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('.btn');
      btn.disabled = true;
      btn.textContent = 'Downloading...';

      const urls = document.getElementById('urls').value.trim();
      const fd = new FormData();
      fd.append('urls', urls);
      fd.append('mode', document.querySelector('[name="mode"]:checked').value);
      fd.append('quality', document.getElementById('quality').value);

      statusEl.style.display = 'block';
      statusEl.className = 'status';
      statusEl.textContent = 'Starting...';
      filesEl.innerHTML = '<p class="p-subtle">Downloading...</p>';

      try {
        const res = await fetch('/download/', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail);
        addHistory(urls);
        statusEl.textContent = 'Task ' + data.task_id + ' — ' + data.message;
        pollTask(data.task_id);
      } catch (err) {
        statusEl.className = 'status error';
        statusEl.textContent = 'Error: ' + err.message;
        btn.disabled = false;
        btn.textContent = 'Start Download';
      }
    });

    async function pollTask(taskId) {
      for (let i = 0; i < 300; i++) {
        await new Promise(r => setTimeout(r, 1000));
        try {
          const res = await fetch('/task/' + taskId);
          const t = await res.json();
          if (t.status === 'done') {
            statusEl.textContent = 'Done';
            showFiles(t.files || []);
            break;
          } else if (t.status === 'error') {
            statusEl.className = 'status error';
            statusEl.textContent = 'Error: ' + t.message;
            filesEl.innerHTML = '';
            break;
          } else {
            statusEl.textContent = 'Downloading... ' + (i + 1) + 's';
          }
        } catch {}
      }
      document.querySelector('.btn').disabled = false;
      document.querySelector('.btn').textContent = 'Start Download';
    }

    function showFiles(files) {
      if (!files.length) { filesEl.innerHTML = '<p class="p-subtle">No files.</p>'; return; }
      filesEl.innerHTML = '<h3>Downloaded</h3><ul>' +
        files.map(f => `<li><a href="/download-file/${encodeURIComponent(f.name)}">${f.name}</a> <span class="size">${f.size_mb} MB</span></li>`).join('') +
        '</ul>' +
        '<a href="/download-all/" class="zip-btn">Download All as ZIP</a>';
    }

    async function loadLatestFiles() {
      try {
        const res = await fetch('/files/');
        const data = await res.json();
        showFiles(data.files || []);
      } catch {}
    }

    loadLatestFiles();
  </script>
</body>
</html>
