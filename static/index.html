<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Batch Downloader</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 16px; line-height: 1.5; }
    h1 { font-size: 1.5rem; }
    textarea { width: 100%; padding: 8px; font-family: inherit; border: 1px solid #ccc; border-radius: 4px; resize: vertical; }
    button { padding: 10px 24px; font-size: 1rem; cursor: pointer; border: none; border-radius: 4px; background: #1670b7; color: #fff; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    select { padding: 6px; font-size: .9rem; }
    .status { margin-top: 20px; white-space: pre-wrap; background: #f5f5f5; padding: 12px; border-radius: 4px; }
    .status.error { background: #ffe8e8; color: #c00; }
    .files { margin-top: 20px; }
    .files a { text-decoration: none; }
    .files a:hover { text-decoration: underline; }
    .zip-btn { display: inline-block; margin-top: 12px; padding: 10px 24px; background: #28a745; color: #fff; border-radius: 4px; text-decoration: none; }
    .zip-btn:hover { background: #218838; }
    .radio-group { display: flex; gap: 20px; margin: 8px 0; }
    .history-btn { font-size: .8rem; margin-left: 8px; padding: 2px 8px; background: #eee; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; }
    .history-list { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 4px; }
    .history-list button { font-size: .75rem; padding: 2px 8px; background: #f0f0f0; color: #333; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-list button:hover { background: #e0e0e0; }
  </style>
</head>
<body>
  <h1>YouTube Audio / Video Batch Downloader</h1>

  <form id="form">
    <label>Paste YouTube URLs (one per line or comma-separated):</label>
    <button type="button" class="history-btn" id="toggleHistory">History</button>
    <div id="historyList" class="history-list" style="display:none"></div>
    <textarea id="urls" rows="6" placeholder="https://youtube.com/watch?v=...&#10;https://youtube.com/playlist?list=..."></textarea>

    <div class="radio-group">
      <label><input type="radio" name="mode" value="audio" checked> <strong>Audio</strong> (native Opus/AAC)</label>
      <label><input type="radio" name="mode" value="video"> <strong>Video</strong></label>
    </div>

    <label>Video quality (ignored for Audio):</label>
    <select id="quality">
      <option value="best">Best</option>
      <option value="2160">4K</option>
      <option value="1080">1080p</option>
      <option value="720">720p</option>
      <option value="480">480p</option>
      <option value="360">360p</option>
    </select>

    <br><br>
    <button type="submit">Start Download</button>
  </form>

  <div id="status" class="status" style="display:none"></div>
  <div class="files" id="files"></div>

  <script>
    const HISTORY_KEY = 'ytdl_url_history';
    const MAX_HISTORY = 20;

    function getHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
    }

    function addHistory(urls) {
      const h = getHistory();
      const entry = urls.trim();
      if (!entry) return;
      const idx = h.indexOf(entry);
      if (idx > -1) h.splice(idx, 1);
      h.unshift(entry);
      if (h.length > MAX_HISTORY) h.length = MAX_HISTORY;
      localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
    }

    function renderHistory() {
      const h = getHistory();
      const el = document.getElementById('historyList');
      if (!h.length) { el.style.display = 'none'; return; }
      el.style.display = 'flex';
      el.innerHTML = h.map(u => `<button type="button" class="hist-item">${u.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</button>`).join('');
      el.querySelectorAll('.hist-item').forEach((btn, i) => {
        btn.addEventListener('click', () => {
          document.getElementById('urls').value = h[i];
          el.style.display = 'none';
        });
      });
    }

    document.getElementById('toggleHistory').addEventListener('click', () => {
      const el = document.getElementById('historyList');
      el.style.display = el.style.display === 'none' ? 'flex' : 'none';
      if (el.style.display === 'flex') renderHistory();
    });

    const form = document.getElementById('form');
    const statusEl = document.getElementById('status');
    const filesEl = document.getElementById('files');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Downloading...';

      const urls = document.getElementById('urls').value.trim();
      const fd = new FormData();
      fd.append('urls', urls);
      fd.append('mode', document.querySelector('[name="mode"]:checked').value);
      fd.append('quality', document.getElementById('quality').value);

      statusEl.style.display = 'block';
      statusEl.className = 'status';
      statusEl.textContent = 'Starting...';
      filesEl.innerHTML = '<p>Downloading...</p>';

      try {
        const res = await fetch('/download/', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail);
        addHistory(urls);
        statusEl.textContent = 'Task ' + data.task_id + ' - ' + data.message;
        pollTask(data.task_id);
      } catch (err) {
        statusEl.className = 'status error';
        statusEl.textContent = 'Error: ' + err.message;
        btn.disabled = false;
        btn.textContent = 'Start Download';
      }
    });

    async function pollTask(taskId) {
      for (let i = 0; i < 300; i++) {
        await new Promise(r => setTimeout(r, 1000));
        try {
          const res = await fetch('/task/' + taskId);
          const t = await res.json();
          if (t.status === 'done') {
            statusEl.textContent = 'Done!';
            showFiles(t.files || []);
            break;
          } else if (t.status === 'error') {
            statusEl.className = 'status error';
            statusEl.textContent = 'Error: ' + t.message;
            filesEl.innerHTML = '';
            break;
          } else {
            statusEl.textContent = 'Downloading... (' + (i + 1) + 's)';
          }
        } catch {}
      }
      document.querySelector('button').disabled = false;
      document.querySelector('button').textContent = 'Start Download';
    }

    function showFiles(files) {
      if (!files.length) { filesEl.innerHTML = '<p>No files downloaded.</p>'; return; }
      filesEl.innerHTML = '<h3>Downloaded files</h3><ul>' +
        files.map(f => `<li><a href="/download-file/${encodeURIComponent(f.name)}">${f.name}</a> (${f.size_mb} MB)</li>`).join('') +
        '</ul>' +
        '<a href="/download-all/" class="zip-btn">Download All as ZIP</a>';
    }

    async function loadLatestFiles() {
      try {
        const res = await fetch('/files/');
        const data = await res.json();
        showFiles(data.files || []);
      } catch {}
    }

    loadLatestFiles();
  </script>
</body>
</html>
